<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MowMoney Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --color-primary: #1a2e8a;
            --color-primary-hover: #142270;
            --color-accent: #c4880a;
            --color-accent-hover: #fdf3e0;
            --color-bg-page: #f8fafc;
            --color-bg-card: #ffffff;
            --color-bg-panel: #f1f5f9;
            --color-text-main: #1e293b;
            --color-text-muted: #64748b;
            --color-border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-page);
            color: var(--color-text-main);
            -webkit-font-smoothing: antialiased;
            padding: 0;
            margin: 0;
        }

        .lo-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .lo-header {
            margin-bottom: 2rem;
            text-align: left;
        }

        .lo-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: -0.025em;
        }

        .lo-subtitle {
            font-size: 14px;
            color: var(--color-text-muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .lo-panel {
            background: var(--color-bg-panel);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .lo-search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 1.25rem;
        }

        .lo-input {
            flex: 1;
            height: 48px;
            padding: 0 18px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            font-size: 15px;
            color: var(--color-text-main);
            background: var(--color-bg-card);
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .lo-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(26, 46, 138, 0.1), inset 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .lo-btn-primary {
            height: 48px;
            padding: 0 28px;
            border-radius: 12px;
            background: var(--color-primary);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .lo-btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .lo-btn-primary:active {
            transform: translateY(0);
        }

        .lo-filters {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lo-filter-btn {
            height: 36px;
            padding: 0 16px;
            border-radius: 10px;
            background: var(--color-bg-card);
            color: var(--color-text-main);
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--color-border);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .lo-filter-btn:hover {
            background: var(--color-bg-panel);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .lo-reset {
            height: 36px;
            padding: 0 16px;
            border-radius: 10px;
            background: transparent;
            color: var(--color-accent);
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--color-accent);
            cursor: pointer;
            margin-left: auto;
            white-space: nowrap;
            transition: var(--transition);
        }

        .lo-reset:hover {
            background: var(--color-accent-hover);
            border-color: var(--color-accent);
        }

        #job-list {
            display: grid;
            gap: 12px;
        }

        /* Results rendering styles (to be used by JS) */
        .lo-job {
            background: var(--color-bg-card);
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
        }

        .lo-job:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
        }

        .lo-job-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
            border: 1px solid var(--color-border);
        }

        .lo-job-info { flex: 1; min-width: 0; }

        .lo-job-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-main);
        }

        .lo-job-meta {
            font-size: 13px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .lo-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 999px;
            font-weight: 500;
        }

        .lo-badge-warn { background: #fef3c7; color: #92400e; } /* Pending */
        .lo-badge-ok { background: #dcfce7; color: #166534; }   /* Complete */
        .lo-badge-over { background: #fee2e2; color: #991b1b; } /* Late */

        .lo-amount {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-primary);
            flex-shrink: 0;
            min-width: 60px;
            text-align: right;
        }

        #job-list:empty::after {
            content: "Please initialize the dashboard...";
            display: block;
            text-align: center;
            padding: 60px;
            color: var(--color-text-muted);
            font-weight: 500;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="lo-wrap">
        <header class="lo-header">
            <h1 class="lo-title">MowMoney Dashboard</h1>
            <p class="lo-subtitle">Best mowers in North Island since 2026</p>
        </header>

        <div class="lo-panel">
            <div class="lo-search-row">
                <input type="text" id="search-input" class="lo-input" placeholder="Search addresses...">
                <button class="lo-btn-primary" onclick="handleSearch()">Search →</button>
            </div>

            <div class="lo-filters">
                <button class="lo-filter-btn" onclick="handleShowPending()">Pending Only</button>
                <button class="lo-filter-btn" onclick="handleShowAlerts()">Overdue Alerts</button>
                <button class="lo-filter-btn" onclick="handleShowExpensiveJobs()">Jobs > $300</button>
                <button class="lo-filter-btn" onclick="addPricing()">Pricing</button>
                <button class="lo-reset" onclick="render(jobs)">↺ Reset View</button>
            </div>
        </div>

        <ul id="job-list">
            <!-- Jobs will be injected here by JavaScript -->
             
        </ul>
    </div>

    <script src="js106-day3-scaffold.js"></script>
</body>

</html>
